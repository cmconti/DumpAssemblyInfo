name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore DumpAssemblyInfo.sln

    - name: Build solution
      run: msbuild DumpAssemblyInfo.sln /p:Configuration=Release /p:Platform="Any CPU" /m

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DumpAssemblyInfo
        path: DumpAssemblyInfo/bin/Release/net48/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: DumpAssemblyInfo
        path: DumpAssemblyInfo

    - name: Create Release Archive
      run: |
        $version = "${{ github.ref_name }}"
        Compress-Archive -Path "DumpAssemblyInfo/*" -DestinationPath "DumpAssemblyInfo-$version.zip"
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: DumpAssemblyInfo-*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
